<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>mermaid-to-excalidraw + PNG</title>
<style>html,body{margin:0;padding:0;background:#fff;}</style>
</head>
<body>
<div id="root"></div>
<script type="module">
  // Pin to versions known to expose exportToBlob in the browser ESM build.
  const M2E = await import("https://esm.sh/@excalidraw/mermaid-to-excalidraw@1.1.2");
  const EX_RAW = await import("https://esm.sh/@excalidraw/excalidraw@0.17.6?bundle");
  const EX = EX_RAW.default && Object.keys(EX_RAW.default).length ? EX_RAW.default : EX_RAW;

  const { parseMermaidToExcalidraw } = M2E;
  const { convertToExcalidrawElements, exportToBlob } = EX;

  if (typeof exportToBlob !== "function") {
    throw new Error(
      "exportToBlob missing. EX keys = " + Object.keys(EX).join(",") +
      " | RAW keys = " + Object.keys(EX_RAW).join(",")
    );
  }

  window.convertOne = async (mermaidText, opts = {}) => {
    const scale = opts.scale || 2;
    const padding = opts.padding ?? 24;
    const bg = opts.bg || "#ffffff";

    // Strategy: a sentinel that mermaid passes through unchanged so its layout
    // engine sees a long single-line label and sizes the box wide enough.
    // After conversion we swap the sentinel for a real newline so the visible
    // text wraps inside the (already-wide) box.
    const NL = "~BR~";
    const preprocessed = mermaidText
      .replace(/<br\s*\/?>/gi, NL)
      .replace(/<\/?(i|b|u|em|strong|span)(\s[^>]*)?>/gi, "");

    const parsed = await parseMermaidToExcalidraw(preprocessed, {
      themeVariables: { fontSize: "16px" },
    });

    const excalidrawElements = convertToExcalidrawElements(parsed.elements);

    const cleanText = (s) => {
      if (typeof s !== "string") return s;
      return s
        .replaceAll(NL, "\n")
        .replace(/<br\s*\/?>/gi, "\n")
        .replace(/<\/?(i|b|u|em|strong|span)(\s[^>]*)?>/gi, "")
        .replace(/&amp;/g, "&")
        .replace(/&lt;/g, "<")
        .replace(/&gt;/g, ">")
        .replace(/&quot;/g, '"');
    };
    for (const el of excalidrawElements) {
      if (el.type === "text" || typeof el.text === "string") {
        if (el.text) el.text = cleanText(el.text);
        if (el.originalText) el.originalText = cleanText(el.originalText);
        if (!el.originalText && el.text) el.originalText = el.text;
      }
    }

    // Re-flow: when we injected newlines, text elements (which were sized
    // for one line) now overflow their containers downward. Recompute height
    // based on line count and grow + recenter the bound container.
    const byId = new Map(excalidrawElements.map((e) => [e.id, e]));
    const APPROX_LINE_HEIGHT = 25; // matches excalidraw default for 16px Virgil
    const VERTICAL_PADDING = 16;
    for (const el of excalidrawElements) {
      if (el.type !== "text" || typeof el.text !== "string") continue;
      const lines = el.text.split("\n").length;
      if (lines <= 1) continue;
      const newTextHeight = lines * APPROX_LINE_HEIGHT;
      const oldTextHeight = el.height || APPROX_LINE_HEIGHT;
      const dy = newTextHeight - oldTextHeight;
      el.height = newTextHeight;

      const container = el.containerId ? byId.get(el.containerId) : null;
      if (container) {
        const neededHeight = newTextHeight + VERTICAL_PADDING * 2;
        if (container.height < neededHeight) {
          const grow = neededHeight - container.height;
          container.height = neededHeight;
          // keep container roughly centered around its original position
          container.y -= grow / 2;
        }
        // recenter text inside (possibly grown) container
        el.y = container.y + (container.height - el.height) / 2;
        el.x = container.x + (container.width - (el.width || 0)) / 2;
      } else {
        // free text: anchor stays at top-left, just shift up by half the
        // growth so the visual center stays put
        el.y -= dy / 2;
      }
    }

    const blob = await exportToBlob({
      elements: excalidrawElements,
      mimeType: "image/png",
      appState: {
        exportBackground: true,
        viewBackgroundColor: bg,
        exportPadding: padding,
      },
      files: parsed.files || null,
      getDimensions: (w, h) => ({ width: w * scale, height: h * scale, scale }),
    });

    const buf = new Uint8Array(await blob.arrayBuffer());
    let bin = "";
    for (let i = 0; i < buf.length; i++) bin += String.fromCharCode(buf[i]);
    const base64png = btoa(bin);

    const excalidrawDoc = {
      type: "excalidraw",
      version: 2,
      source: "mermaid-to-excalidraw",
      elements: excalidrawElements,
      appState: { viewBackgroundColor: bg, gridSize: null },
      files: parsed.files || {},
    };

    return { ok: true, base64png, excalidraw: excalidrawDoc };
  };

  window.__convertReady = true;
</script>
</body>
</html>
